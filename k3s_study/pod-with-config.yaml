apiVersion: v1
kind: Pod
metadata:
  name: config-demo
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    envFrom:                          # 方式1：整个 ConfigMap → 环境变量
    - configMapRef:
        name: app-config
    volumeMounts:                     # 方式2：配置文件挂载
    - name: nginx-config
      mountPath: /etc/nginx/conf.d   # 挂载到 nginx 配置目录
  volumes:
  - name: nginx-config
    configMap:
      name: app-config
      items:
      - key: nginx.conf              # 只取 ConfigMap 里的 nginx.conf
        path: default.conf           # 挂载为 /etc/nginx/conf.d/default.conf
